kind = "web"
previewPath = "/"
title = "Bera Downloader"
version = "1.0.0"
id = "artifacts/bera-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20823

[services.development]
run = "pnpm --filter @workspace/bera-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bera-web", "run", "build" ]
publicDir = "artifacts/bera-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20823"
BASE_PATH = "/"
